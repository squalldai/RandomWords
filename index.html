<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>随机单词 + Gemini 小故事生成器 (1.8 - Key 手動輸入)</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    h1 { color: #2c5282; margin-bottom: 1.5rem; }
    .container {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 700px;
    }
    .word-box {
      margin: 1.5rem 0;
      padding: 1.2rem;
      border-radius: 12px;
      background: #edf2f7;
      font-size: 1.4rem;
      line-height: 1.8;
    }
    .word { font-weight: bold; color: #2b6cb0; margin-right: 0.6rem; }
    .type { color: #718096; font-size: 1rem; }
    button {
      background: #4299e1;
      color: white;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      margin: 1rem 0.5rem;
      min-width: 180px;
    }
    button:hover:not(:disabled) { background: #3182ce; transform: translateY(-2px); }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
    #stories {
      margin-top: 1.5rem;
      text-align: left;
      background: #f7fafc;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      display: none;
      position: relative;
      overflow: hidden;
    }
    #stories.show { display: block; }
    #stories h3 { margin: 0 0 1rem 0; color: #2d3748; }
    .story-container {
      position: relative;
    }
    .story {
      margin: 0.9rem 0;
      line-height: 1.6;
      font-size: 1.1rem;
      transition: filter 0.4s ease, opacity 0.4s ease;
    }
    .story strong { font-weight: bold; color: #2b6cb0; }
    .blur-overlay {
      position: absolute;
      inset: 0;
      background: rgba(240, 244, 248, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 2;
    }
    .blur-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #status { color: #e53e3e; margin: 1rem 0; min-height: 1.2em; }
  </style>
</head>
<body>

  <div class="container">
    <h1>随机单词 + 小故事生成器 (1.8)</h1>
    
    <div id="words" class="word-box">
      点击按钮开始抽取单词和生成故事！
    </div>

    <button id="generateBtn" type="button">抽取 & 生成小故事</button>

    <div id="status"></div>

    <div id="stories">
      <h3>一个小故事（小学四年级水平，约60秒朗读）</h3>
      <div class="story-container">
        <div class="blur-overlay" id="blurOverlay"></div>
        <div id="storyList" class="story"></div>
      </div>
      <button id="toggleAnswerBtn" type="button" style="display:none;">显示答案</button>
    </div>
  </div>

  <script>
    const PASSWORD = "888";  // 已修改為 888

    // 檢查並載入儲存的 API Key（只輸入一次）
    let API_KEY = localStorage.getItem('gemini_api_key');

    if (!API_KEY) {
      API_KEY = prompt("請輸入你的 Gemini API Key（只輸入一次，下次自動記住）：");
      if (API_KEY && API_KEY.trim() !== "") {
        localStorage.setItem('gemini_api_key', API_KEY.trim());
        alert("Key 已儲存，下次開啟網頁自動使用！");
      } else {
        alert("未輸入有效 Key，無法生成故事。請重新開啟網頁輸入。");
        document.getElementById("generateBtn").disabled = true;
        document.getElementById("status").textContent = "缺少 API Key，請重新開啟網頁輸入 Key。";
      }
    }

    const nouns = ["banana 香蕉","calendar 日历","classroom 教室","dinosaur 恐龙","doll 玩偶","envelope 信封","furniture 家具","giraffe 长颈鹿","hat 帽子","helicopter 直升机","instrument 乐器","kangaroo 袋鼠","kite 风筝","lamp 台灯","laboratory 实验室","magazine 杂志","moon 月亮","necklace 项链","question 问题","restaurant 餐厅","suitcase 手提箱","wallet 钱包"];
    const verbs = ["buy 购买","clean 打扫","climb 攀爬","cook 做饭","dance 跳舞","draw 画画","drive 驾驶","enlarge 扩大","examine 检查","float 漂浮","help 帮助","investigate 调查","jump 跳跃","listen 听","play 玩、演奏","read 阅读","ride 骑","sell 卖","swim 游泳","watch 观看","wash 清洗","write 写"];
    const adjs = ["artificial 人造的","brilliant 聪明的、出色的","careful 小心的","changeable 多变的","dull 无聊的、暗淡的","essential 重要的、必要的","generous 慷慨的","hard 困难的、坚硬的","honest 诚实的","light 轻的、明亮的","loud 大声的","mild 温和的","obvious 明显的","popular 受欢迎的","powerful 强大的","reliable 可靠的","fantastic 极好的","strange 奇怪的","terrific 很棒的","vivid 生动的","quiet 安静的","slim 苗条的"];

    const MODEL = "gemini-2.5-flash";

    function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    async function callGemini(prompt, previousText = "") {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
              temperature: 0.65,
              maxOutputTokens: 1500,
              topP: 0.95
            }
          })
        }
      );

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      let text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";

      if (previousText) text = previousText + " " + text;

      return text;
    }

    async function generateStoryWithRetry(adj, noun, verb) {
      let fullStory = "";
      let attempt = 0;
      const maxAttempts = 3;

      while (attempt < maxAttempts) {
        const continuationPrompt = attempt > 0 
          ? `Continue the story from exactly where it stopped. Do NOT repeat previous sentences. Finish the story with a happy ending. Add more sentences until there are at least 6 sentences in total. Use very simple 4th grade English. Keep bold for the three words if they appear again. Previous part: "${fullStory}"`
          : `Write one very short and simple English story. It MUST have exactly 6 to 9 complete sentences. Do NOT stop early or cut off mid-sentence.

The story must naturally use these three words: adjective "${adj}", noun "${noun}", verb "${verb}".

Use only very easy English words for Chinese 4th grade students. Use short and clear sentences. Make the story happy, fun, and easy to read aloud (about 50-60 seconds total).

The story needs a clear beginning, middle, and happy ending. Finish the story completely. Write all sentences without stopping.

In the story, make the three words bold like this: **${adj}**, **${noun}**, **${verb}**. Bold ONLY these three words, nothing else.

Do not add title, numbers, explanations, or any extra text. Just write the story sentences.`;

        fullStory = await callGemini(continuationPrompt, fullStory);

        const sentences = fullStory.split(/[.!?]\s*/).filter(s => s.trim().length > 3);
        if (sentences.length >= 6 && !fullStory.trim().endsWith(",") && !fullStory.trim().endsWith("and")) {
          break;
        }
        attempt++;
      }

      return fullStory;
    }

    async function generate() {
      if (!API_KEY) {
        alert("缺少 API Key，請重新開啟網頁並輸入 Key。");
        return;
      }

      const btn = document.getElementById("generateBtn");
      const status = document.getElementById("status");
      const storiesDiv = document.getElementById("stories");
      const storyList = document.getElementById("storyList");
      const toggleBtn = document.getElementById("toggleAnswerBtn");
      const blurOverlay = document.getElementById("blurOverlay");

      btn.disabled = true;
      let countdown = 30;
      const originalText = btn.textContent;
      const timer = setInterval(() => {
        countdown--;
        btn.textContent = `请等待 ${countdown} 秒...`;
        if (countdown <= 0) {
          clearInterval(timer);
          btn.textContent = originalText;
          btn.disabled = false;
        }
      }, 1000);

      status.textContent = "正在抽词并生成故事...";
      storiesDiv.classList.remove("show");
      storyList.innerHTML = "";
      toggleBtn.style.display = "none";
      blurOverlay.classList.remove("hidden");

      try {
        const adjFull = getRandom(adjs);
        const nounFull = getRandom(nouns);
        const verbFull = getRandom(verbs);

        const adj = adjFull.split(" ")[0];
        const noun = nounFull.split(" ")[0];
        const verb = verbFull.split(" ")[0];

        document.getElementById("words").innerHTML = `
          <span class="word">${adjFull}</span><span class="type">(adj.)</span><br>
          <span class="word">${nounFull}</span><span class="type">(n.)</span><br>
          <span class="word">${verbFull}</span><span class="type">(v.)</span>
        `;

        const generatedText = await generateStoryWithRetry(adj, noun, verb);

        if (!generatedText.trim()) throw new Error("没有生成有效内容");

        storyList.innerHTML = generatedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        storiesDiv.classList.add("show");
        toggleBtn.style.display = "inline-block";
        toggleBtn.textContent = "显示答案";
        blurOverlay.classList.remove("hidden");

        status.textContent = "故事已生成（点击“显示答案”查看，需要密码）";

      } catch (err) {
        status.textContent = `出错：${err.message}`;
        console.error(err);
      } finally {
        clearInterval(timer);
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    document.getElementById("toggleAnswerBtn").addEventListener("click", function() {
      const blurOverlay = document.getElementById("blurOverlay");
      const toggleBtn = this;

      if (blurOverlay.classList.contains("hidden")) {
        blurOverlay.classList.remove("hidden");
        toggleBtn.textContent = "显示答案";
      } else {
        const input = prompt("请输入密码显示答案：");
        if (input === PASSWORD) {
          blurOverlay.classList.add("hidden");
          toggleBtn.textContent = "隐藏答案";
        } else if (input !== null) {
          alert("密码错误！");
        }
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("generateBtn").addEventListener("click", generate);
    });
  </script>

</body>
</html>
