<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>随机单词 + Gemini 小故事生成器 (1.3)</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #2c5282;
      margin-bottom: 1.5rem;
    }
    .container {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 700px;
    }
    .word-box {
      margin: 1.5rem 0;
      padding: 1.2rem;
      border-radius: 12px;
      background: #edf2f7;
      font-size: 1.4rem;
      line-height: 1.8;
    }
    .word {
      font-weight: bold;
      color: #2b6cb0;
      margin-right: 0.6rem;
    }
    .type {
      color: #718096;
      font-size: 1rem;
    }
    button {
      background: #4299e1;
      color: white;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      margin: 1rem 0;
      min-width: 280px;
    }
    button:hover:not(:disabled) {
      background: #3182ce;
      transform: translateY(-2px);
    }
    button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }
    #stories {
      margin-top: 1.5rem;
      text-align: left;
      background: #f7fafc;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      display: none;
    }
    #stories.show {
      display: block;
    }
    #stories h3 {
      margin: 0 0 1rem 0;
      color: #2d3748;
    }
    .story {
      margin: 0.9rem 0;
      line-height: 1.6;
      font-size: 1.1rem;
    }
    .story strong {
      font-weight: bold;
      color: #2b6cb0;
    }
    #status {
      color: #e53e3e;
      margin: 1rem 0;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>随机单词 + 小故事生成器 (1.3)</h1>
    
    <div id="words" class="word-box">
      点击按钮开始抽取单词和生成故事！
    </div>

    <button id="generateBtn" type="button">抽取 & 生成小故事</button>

    <div id="status"></div>

    <div id="stories">
      <h3>一个小故事（小学四年级水平，约60秒朗读）</h3>
      <div id="storyList" class="story"></div>
    </div>
  </div>

  <script>
    // 词库
    const nouns = [
      "banana 香蕉", "calendar 日历", "classroom 教室", "dinosaur 恐龙", "doll 玩偶",
      "envelope 信封", "furniture 家具", "giraffe 长颈鹿", "hat 帽子", "helicopter 直升机",
      "instrument 乐器", "kangaroo 袋鼠", "kite 风筝", "lamp 台灯", "laboratory 实验室",
      "magazine 杂志", "moon 月亮", "necklace 项链", "question 问题", "restaurant 餐厅",
      "suitcase 手提箱", "wallet 钱包"
    ];

    const verbs = [
      "buy 购买", "clean 打扫", "climb 攀爬", "cook 做饭", "dance 跳舞",
      "draw 画画", "drive 驾驶", "enlarge 扩大", "examine 检查", "float 漂浮",
      "help 帮助", "investigate 调查", "jump 跳跃", "listen 听", "play 玩、演奏",
      "read 阅读", "ride 骑", "sell 卖", "swim 游泳", "watch 观看",
      "wash 清洗", "write 写"
    ];

    const adjs = [
      "artificial 人造的", "brilliant 聪明的、出色的", "careful 小心的", "changeable 多变的",
      "dull 无聊的、暗淡的", "essential 重要的、必要的", "generous 慷慨的", "hard 困难的、坚硬的",
      "honest 诚实的", "light 轻的、明亮的", "loud 大声的", "mild 温和的", "obvious 明显的",
      "popular 受欢迎的", "powerful 强大的", "reliable 可靠的", "fantastic 极好的",
      "strange 奇怪的", "terrific 很棒的", "vivid 生动的", "quiet 安静的", "slim 苗条的"
    ];

    const API_KEY = "AIzaSyA93MxkMFOZsEZv8fC5rAsMn6PJBIghVyI";
    const MODEL = "gemini-2.5-flash";

    function getRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    async function generate() {
      const btn = document.getElementById("generateBtn");
      const status = document.getElementById("status");
      const storiesDiv = document.getElementById("stories");
      const storyList = document.getElementById("storyList");

      // 禁用按钮并启动 10 秒倒计时
      btn.disabled = true;
      let countdown = 10;
      const originalText = btn.textContent;
      const timer = setInterval(() => {
        countdown--;
        btn.textContent = `请等待 ${countdown} 秒...`;
        if (countdown <= 0) {
          clearInterval(timer);
          btn.textContent = originalText;
          btn.disabled = false;
        }
      }, 1000);

      status.textContent = "正在抽词并请求Gemini生成故事... 请稍等";
      storiesDiv.classList.remove("show");
      storyList.innerHTML = "";

      try {
        const adjFull = getRandom(adjs);
        const nounFull = getRandom(nouns);
        const verbFull = getRandom(verbs);

        const adj = adjFull.split(" ")[0];
        const noun = nounFull.split(" ")[0];
        const verb = verbFull.split(" ")[0];

        document.getElementById("words").innerHTML = `
          <span class="word">${adjFull}</span><span class="type">(adj.)</span><br>
          <span class="word">${nounFull}</span><span class="type">(n.)</span><br>
          <span class="word">${verbFull}</span><span class="type">(v.)</span>
        `;

        // 1.3 版本 prompt：难度降为小学四年级
        const prompt = `Write exactly one very short and simple English story with 6 to 9 sentences. 
The story must use these three words naturally: 
adjective "${adj}", noun "${noun}", verb "${verb}". 

Use very very easy English words for Chinese 4th grade primary school students. 
Use short sentences. 
Make the story happy, fun, and easy to understand. 
It should be good to read aloud and take about 50 to 60 seconds. 

In the story, show the three words in **bold** like this: **${adj}**, **${noun}**, **${verb}**. 
Only make these three words bold, nothing else. 
Do not add title, numbers, or any extra words outside the story.`;

        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: {
                temperature: 0.8,
                maxOutputTokens: 700,
                topP: 0.95
              }
            })
          }
        );

        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData.error?.message || `HTTP ${response.status}`);
        }

        const data = await response.json();
        let generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";

        if (!generatedText.trim()) {
          throw new Error("Gemini没有返回有效内容");
        }

        generatedText = generatedText.trim();

        storyList.innerHTML = generatedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        storiesDiv.classList.add("show");
        status.textContent = "生成完成！";

      } catch (err) {
        status.textContent = `出错：${err.message}（可能是API问题、配额用完或网络问题）`;
        console.error(err);
        // 出错时也恢复按钮
        clearInterval(timer);
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      document.getElementById("generateBtn").addEventListener("click", generate);
    });
  </script>

</body>
</html>
