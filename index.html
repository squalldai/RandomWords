<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>随机单词生成器</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #2c5282;
      margin-bottom: 2rem;
    }
    .container {
      background: white;
      padding: 2.5rem 3rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      min-width: 320px;
      max-width: 600px;
    }
    .word-box {
      margin: 1.5rem 0;
      padding: 1.2rem;
      border-radius: 12px;
      background: #edf2f7;
      font-size: 1.3rem;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .word {
      font-weight: bold;
      color: #2b6cb0;
    }
    .type {
      color: #718096;
      font-size: 1rem;
      margin-left: 0.5rem;
    }
    button {
      background: #4299e1;
      color: white;
      border: none;
      padding: 1rem 2.5rem;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: all 0.2s;
    }
    button:hover {
      background: #3182ce;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(66,153,225,0.35);
    }
    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>随机单词生成器</h1>
    
    <div id="result" class="word-box">
      点击按钮开始！
    </div>

    <button onclick="generateWords()">抽一个组合！</button>
  </div>

  <script>
    // 词库
    const nouns = [
      "banana 香蕉", "calendar 日历", "classroom 教室", "dinosaur 恐龙", "doll 玩偶",
      "envelope 信封", "furniture 家具", "giraffe 长颈鹿", "hat 帽子", "helicopter 直升机",
      "instrument 乐器", "kangaroo 袋鼠", "kite 风筝", "lamp 台灯", "laboratory 实验室",
      "magazine 杂志", "moon 月亮", "necklace 项链", "question 问题", "restaurant 餐厅",
      "suitcase 手提箱", "wallet 钱包"
    ];

    const verbs = [
      "buy 购买", "clean 打扫", "climb 攀爬", "cook 做饭", "dance 跳舞",
      "draw 画画", "drive 驾驶", "enlarge 扩大", "examine 检查", "float 漂浮",
      "help 帮助", "investigate 调查", "jump 跳跃", "listen 听", "play 玩、演奏",
      "read 阅读", "ride 骑", "sell 卖", "swim 游泳", "watch 观看",
      "wash 清洗", "write 写"
    ];

    const adjs = [
      "artificial 人造的", "brilliant 聪明的、出色的", "careful 小心的", "changeable 多变的",
      "dull 无聊的、暗淡的", "essential 重要的、必要的", "generous 慷慨的", "hard 困难的、坚硬的",
      "honest 诚实的", "light 轻的、明亮的", "loud 大声的", "mild 温和的", "obvious 明显的",
      "popular 受欢迎的", "powerful 强大的", "reliable 可靠的", "fantastic 极好的",
      "strange 奇怪的", "terrific 很棒的", "vivid 生动的", "quiet 安静的", "slim 苗条的"
    ];

    function getRandomItem(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateWords() {
      const n = getRandomItem(nouns);
      const v = getRandomItem(verbs);
      const adj = getRandomItem(adjs);

      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = `
        <span class="word">${adj}</span><span class="type">(adj.)</span><br>
        <span class="word">${n}</span><span class="type">(n.)</span><br>
        <span class="word">${v}</span><span class="type">(v.)</span>
      `;
    }
  </script>

</body>
</html>
